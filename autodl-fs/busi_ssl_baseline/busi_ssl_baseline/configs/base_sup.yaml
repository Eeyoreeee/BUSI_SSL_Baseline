experiment:
  name: sup_base
  output_root: /root/autodl-fs/busi_ssl_baseline/busi_ssl_baseline/outputs
  notes: Base supervised config with the unified stage-1 optimization recipe.

data:
  dataset_name: BUSI
  dataset_root: /root/autodl-fs/Dataset_BUSI_with_GT
  manifest_path: /root/autodl-fs/busi_ssl_baseline/busi_ssl_baseline/data_meta/manifest.csv
  merged_mask_root: /root/autodl-fs/busi_ssl_baseline/busi_ssl_baseline/data_meta/merged_masks
  split_root: /root/autodl-fs/busi_ssl_baseline/busi_ssl_baseline/data_meta/splits/seed0_labeled_1of2
  train_split: labeled_subset.txt
  val_split: val.txt
  test_split: test.txt
  image_size: 512
  image_channels: 3
  grayscale_to_rgb: repeat
  include_normal: false
  label_groups: [benign, malignant]
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  train_hflip_prob: 0.5
  train_vflip_prob: 0.0
  train_max_rotate_deg: 10.0
  train_scale_min: 0.9
  train_scale_max: 1.1
  train_crop_min_ratio: 1.0
  train_color_jitter_strength: 0.2
  train_blur_prob: 0.1
  train_noise_std: 0.0
  num_workers: 4
  pin_memory: true
  persistent_workers: true

model:
  name: deeplabv3plus
  encoder_name: resnet50
  encoder_weights: imagenet
  encoder_weight_source: segmentation_models_pytorch::resnet50/imagenet
  encoder_weight_note: standard ImageNet-pretrained ResNet50 encoder; not claimed as official torchvision ResNet50 weights
  claim_official_torchvision_equivalence: false
  in_channels: 3
  classes: 1

loss:
  supervised_name: bce_plus_dice
  bce_weight: 1.0
  dice_weight: 1.0

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  enabled: true
  name: cosine_with_linear_warmup
  warmup_epochs: 5
  min_lr_ratio: 0.01

train:
  seed: 0
  epochs: 100
  batch_size: 4
  amp: true
  grad_clip_norm: null
  log_interval: 10
  val_interval: 1

eval:
  threshold: 0.5
  primary_metric: dice

logging:
  use_tensorboard: true
